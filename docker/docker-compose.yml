version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hutanotrack-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hutanotrack
      POSTGRES_PASSWORD: hutanotrack
      POSTGRES_DB: hutanotrack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hutanotrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: hutanotrack-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: hutanotrack
      DB_PASSWORD: hutanotrack
      DB_NAME: hutanotrack
      JWT_SECRET: ${JWT_SECRET:-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: hutanotrack-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000
    depends_on:
      - api

volumes:
  postgres_data:
