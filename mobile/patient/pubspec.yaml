name: hutanotrack_patient
description: HutanoTrack Patient Mobile Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  lottie: ^3.1.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.0

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.2.7

  # Networking
  dio: ^5.7.0
  retrofit: ^4.2.0
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.3
  path_provider: ^2.1.4
  Drift: ^2.21.0

  # Authentication
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.3.0
  pin_code_fields: ^8.0.1

  # Health & Sensors
  health: ^10.2.0
  sensors_plus: ^6.0.1

  # Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Communication
  url_launcher: ^6.3.1
  share_plus: ^10.0.3
  flutter_local_notifications: ^18.0.1

  # Media
  image_picker: ^1.1.2
  permission_handler: ^11.3.1

  # Charts
  fl_chart: ^0.69.0

  # Utils
  intl: ^0.19.0
  connectivity_plus: ^6.0.5
  package_info_plus: ^8.0.2
  device_info_plus: ^11.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  json_serializable: ^6.8.0
  freezed: ^2.5.7
  retrofit_generator: ^8.1.0
  drift_dev: ^2.21.0
  hive_generator: ^2.0.1
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/l10n/
