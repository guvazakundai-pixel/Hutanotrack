name: hutanotrack_patient
description: HutanoTrack Patient Mobile Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # State Management
  riverpod: ^2.5.0
  flutter_riverpod: ^2.4.9
  # Navigation
  go_router: ^13.0.0
  # Networking
  dio: ^5.4.0
  retrofit: ^4.1.0
  json_annotation: ^4.8.1
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  # Auth & Security
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.8
  # UI Components
  shimmer: ^3.0.0
  fl_chart: ^0.66.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  google_fonts: ^6.1.0
  # Connectivity
  connectivity_plus: ^5.0.2
  # Notifications
  flutter_local_notifications: ^17.0.0
  firebase_messaging: ^14.7.15
  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.2.2
  image_picker: ^1.0.7
  geolocator: ^10.1.0
  # Charts & Visualization
  syncfusion_flutter_charts: ^24.1.41

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  retrofit_generator: ^8.1.0
  hive_generator: ^2.0.1
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/i18n/
